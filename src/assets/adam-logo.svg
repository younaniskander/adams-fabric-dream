<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      @keyframes f1 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(4deg); } }
      @keyframes f2 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-18px) rotate(-5deg); } }
      @keyframes f3 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(6deg); } }
      @keyframes f4 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(-3deg); } }
      @keyframes f5 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
      @keyframes p1 { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

      .float-1 { animation: f1 6s ease-in-out infinite; }
      .float-2 { animation: f2 5s ease-in-out infinite 1s; }
      .float-3 { animation: f3 7s ease-in-out infinite 2s; }
      .float-4 { animation: f4 5.5s ease-in-out infinite 1.5s; }
      .float-5 { animation: f5 6.5s ease-in-out infinite 0.5s; }
      .pulse { animation: p1 4s ease-in-out infinite; }

      .brand-text {
        font-family: 'Playfair Display', 'Georgia', serif;
        font-weight: 700;
        font-size: 76px;
        fill: #4A3B32;
      }
      .brand-subtext {
        font-family: 'Montserrat', 'Arial', sans-serif;
        font-weight: 500;
        font-size: 15px;
        fill: #8E735B;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <!-- Background Circle (Avatar) -->
  <rect width="500" height="500" rx="250" fill="#FDFBF7" />
  <circle cx="250" cy="250" r="235" fill="none" stroke="#E5D9C5" stroke-width="2" stroke-dasharray="10 10" />

  <!-- Measuring Tape (element-3) -->
  <g class="float-3" style="transform-origin: 250px 420px;">
    <g transform="translate(250, 420)">
      <path d="M -150,-10 C -75,40 -25,-40 50,-30 C 125,-20 175,30 200,10" fill="none" stroke="#E1B15D" stroke-width="14" stroke-linecap="round" />
      <path d="M -150,-10 C -75,40 -25,-40 50,-30 C 125,-20 175,30 200,10" fill="none" stroke="#8E735B" stroke-width="14" stroke-dasharray="2 14" stroke-linecap="butt" opacity="0.5" />
    </g>
  </g>

  <!-- Solid dark blue piece behind -->
  <g class="float-4" style="transform-origin: 380px 140px;">
    <g transform="translate(360, 130) rotate(-10)">
      <rect x="-25" y="-25" width="50" height="50" rx="4" fill="#2E5C55" />
      <circle cx="0" cy="0" r="2" fill="#fff" opacity="0.4" />
      <circle cx="10" cy="10" r="2" fill="#fff" opacity="0.4" />
      <circle cx="-10" cy="-10" r="2" fill="#fff" opacity="0.4" />
      <circle cx="-10" cy="10" r="2" fill="#fff" opacity="0.4" />
      <circle cx="10" cy="-10" r="2" fill="#fff" opacity="0.4" />
    </g>
    <!-- Plaid fabric piece front -->
    <g transform="translate(385, 145) rotate(15)">
      <rect x="-30" y="-30" width="60" height="60" rx="4" fill="#D36B53" />
      <rect x="-20" y="-30" width="10" height="60" fill="#E1B15D" opacity="0.6" />
      <rect x="10" y="-30" width="5" height="60" fill="#2E5C55" opacity="0.6" />
      <rect x="-30" y="-10" width="60" height="10" fill="#E1B15D" opacity="0.6" />
      <rect x="-30" y="15" width="60" height="5" fill="#2E5C55" opacity="0.6" />
    </g>
  </g>

  <!-- Button -->
  <g class="float-2" style="transform-origin: 120px 160px;">
    <g transform="translate(120, 160) rotate(15)">
      <circle cx="0" cy="0" r="20" fill="#E1B15D" />
      <circle cx="0" cy="0" r="16" fill="none" stroke="#C49B50" stroke-width="2" stroke-dasharray="3 3" />
      <circle cx="-6" cy="-6" r="3" fill="#A8813C" />
      <circle cx="6" cy="-6" r="3" fill="#A8813C" />
      <circle cx="-6" cy="6" r="3" fill="#A8813C" />
      <circle cx="6" cy="6" r="3" fill="#A8813C" />
      <path d="M-6,-6 L6,6 M-6,6 L6,-6" stroke="#4A3B32" stroke-width="1.5" />
    </g>
  </g>

  <!-- Spool -->
  <g class="float-1" style="transform-origin: 100px 340px;">
    <g transform="translate(100, 340) rotate(-20)">
      <path d="M-15,-25 L15,-25 L12,-16 L-12,-16 Z" fill="#D2B48C" />
      <path d="M-15,25 L15,25 L12,16 L-12,16 Z" fill="#D2B48C" />
      <rect x="-12" y="-16" width="24" height="32" fill="#A93333" />
      <g stroke="#7D2020" stroke-width="1.5">
        <line x1="-12" y1="-10" x2="12" y2="-10" />
        <line x1="-12" y1="-2" x2="12" y2="-2" />
        <line x1="-12" y1="6" x2="12" y2="6" />
        <line x1="-12" y1="14" x2="12" y2="14" />
      </g>
      <path d="M 12,0 C 30,-20 40,20 80,0" fill="none" stroke="#A93333" stroke-width="2" />
    </g>
  </g>

  <!-- Scissors -->
  <g class="float-4" style="transform-origin: 390px 350px;">
    <g transform="translate(390, 350) rotate(-40)">
      <path d="M 0,-10 L -30,-60 L -25,-60 Z" fill="#D0D0D0" />
      <path d="M 0,-10 L -15,-65 L -10,-65 Z" fill="#E8E8E8" />
      <circle cx="-5" cy="-20" r="2" fill="#888" />
      <path d="M 0,-10 C 20,0 20,30 5,30 C -10,30 -10,0 0,-10 Z" fill="none" stroke="#2E5C55" stroke-width="4.5" />
      <path d="M -10,-10 C -30,0 -30,20 -15,20 C 0,20 0,0 -10,-10 Z" fill="none" stroke="#2E5C55" stroke-width="4.5" />
    </g>
  </g>

  <!-- Needle and Thread -->
  <g class="float-5" style="transform-origin: 250px 80px;">
    <g transform="translate(250, 80) rotate(50)">
      <path d="M-2,-50 L2,-50 L1,40 L-1,40 Z" fill="#D0D0D0" />
      <path d="M-1,40 L1,40 L0,50 Z" fill="#999" />
      <ellipse cx="0" cy="-40" rx="1.5" ry="5" fill="#FAFAFA" />
      <path d="M0,-40 C-30,-60 -50,-20 -20,-10 C 10,0 30,30 20,50" fill="none" stroke="#A93333" stroke-width="1.5" />
    </g>
  </g>

  <!-- Center Text -->
  <g class="pulse" style="transform-origin: 250px 250px;" text-anchor="middle" dominant-baseline="middle">
    <text x="250" y="235" class="brand-text">ADAM</text>
    <path d="M 185,260 L 315,260" stroke="#E1B15D" stroke-width="2" stroke-linecap="round" />
    <path d="M 235,260 L 265,260" stroke="#4A3B32" stroke-width="2" stroke-linecap="round" />
    <text x="254" y="285" class="brand-subtext">CREATIVE TEXTILES</text>
  </g>

  <!-- Floating Sparkles -->
  <g fill="#E1B15D">
    <path class="float-1" style="transform-origin: 160px 220px;" d="M 160,215 L 162,219 L 166,220 L 162,221 L 160,225 L 158,221 L 154,220 L 158,219 Z" />
    <path class="float-5" style="transform-origin: 320px 180px;" d="M 320,175 L 322,179 L 326,180 L 322,181 L 320,185 L 318,181 L 314,180 L 318,179 Z" />
    <path class="float-2" style="transform-origin: 180px 320px;" d="M 180,317 L 181,319 L 183,320 L 181,321 L 180,323 L 179,321 L 177,320 L 179,319 Z" />
    <path class="float-3" style="transform-origin: 340px 300px;" d="M 340,295 L 342,299 L 346,300 L 342,301 L 340,305 L 338,301 L 334,300 L 338,299 Z" />
  </g>

</svg>
